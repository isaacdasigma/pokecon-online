<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéCon Online | Live Exhibition Floor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gill+Sans+MT:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #222222;
            padding-bottom: 80px;
        }
        header {
            background-color: #2a75d3;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }
        .floor-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .floor-title {
            font-family: 'Montserrat', sans-serif;
            color: #e3350d;
            text-transform: uppercase;
            border-bottom: 3px solid #ffcb05;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .booth-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .booth-card {
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 480px;
        }
        .booth-card:hover {
            transform: translateY(-5px);
            border-color: #2a75d3;
        }
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 10;
        }
        .badge.live {
            background-color: #ff0000;
            color: white;
            animation: blink 1.5s infinite;
        }
        .booth-card h4 {
            font-family: 'Montserrat', sans-serif;
            margin: 10px 0 5px 0;
            font-size: 18px;
        }
        .seller-name {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .specialty {
            background: #f0f4f8;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
            align-self: flex-start;
        }
        
        /* 📹 STREAM LAYOUT */
        .webcam-box {
            width: 100%;
            height: 140px;
            background: #000;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            position: relative;
        }
        .webcam-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 📸 CARD/PACK SHOWCASE IMAGE */
        .showcase-box {
            width: 100%;
            height: 120px;
            background: #e9e9f0;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .showcase-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .showcase-label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            color: #757575;
            margin-bottom: 4px;
            display: block;
        }

        .btn {
            display: inline-block;
            background-color: #ffcb05;
            color: #222;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border-radius: 6px;
            text-transform: uppercase;
            text-align: center;
            border: none;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }
        .btn-blue {
            background-color: #2a75d3;
            color: white;
        }
        .btn-kick {
            background-color: #757575;
            color: white;
            margin-top: 5px;
            font-size: 11px;
            padding: 5px;
        }
        .rent-booth {
            border: 3px dashed #b0b0b0; 
            background: #fafafa; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 30px;
            border-radius: 12px;
            min-height: 480px;
            box-sizing: border-box;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 999;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 4px solid #ffcb05;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            font-family: 'Montserrat', sans-serif;
            margin-top: 0;
            color: #2a75d3;
            text-transform: uppercase;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 2px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🏪 PokéCon Marketplace</h1>
        <nav>
            <a href="index.html">⬅️ Back to Lobby</a>
        </nav>
    </header>

    <div class="floor-container">
        <h3 class="floor-title">Exhibition Hall A</h3>
        
        <div class="booth-grid" id="gridContainer">
            <div id="booth-1-container"></div>
            <div id="booth-2-container"></div>
            <div id="booth-3-container"></div>
            <div id="booth-4-container"></div>
        </div>
    </div>

    <div class="modal-overlay" id="rentalModal">
        <div class="modal-content">
            <h3>🎪 Rent Your Booth</h3>
            <div class="form-group">
                <label for="shopName">Shop / Stream Name</label>
                <input type="text" id="shopName" placeholder="e.g., Charizard Central">
            </div>
            <div class="form-group">
                <label for="trainerName">Trainer Name</label>
                <input type="text" id="trainerName" placeholder="e.g., Trainer_Red">
            </div>
            <div class="form-group">
                <label for="description">What are you doing/selling?</label>
                <input type="text" id="description" placeholder="e.g., Pulling heavy hitters!">
            </div>
            <div class="form-group">
                <label for="specialty">Choose Category Tag</label>
                <select id="specialty">
                    <option value="⚔️ Modern TCG">Modern TCG</option>
                    <option value="🦖 Vintage (1999)">Vintage Era</option>
                    <option value="🎯 Japanese Sets">Japanese Sets</option>
                    <option value="🎨 Custom Art/Pins">Custom Art/Pins</option>
                </select>
            </div>
            <div class="form-group">
                <label for="boothImage">📸 Upload Pack or Card Image</label>
                <input type="file" id="boothImage" accept="image/*">
            </div>
            <div class="modal-actions">
                <button class="btn btn-blue" onclick="closeRentalForm()">Cancel</button>
                <button class="btn" style="background-color: #e3350d; color: white;" onclick="submitRentalForm()">Start Streaming!</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PokéCon Online Concept</p>
    </footer>

    <script>
        let targetedBoothId = '';
        const ONE_HOUR = 60 * 60 * 1000;
        let activeStreams = {};

        document.addEventListener("DOMContentLoaded", () => {
            for(let i = 1; i <= 4; i++) {
                renderBooth(`booth-${i}`);
            }
        });

        function renderBooth(id) {
            const container = document.getElementById(`${id}-container`);
            const savedData = localStorage.getItem(id);

            if (savedData) {
                const booth = JSON.parse(savedData);
                const currentTime = new Date().getTime();

                if (currentTime - booth.timestamp > ONE_HOUR) {
                    localStorage.removeItem(id);
                    renderEmptyBooth(container, id);
                } else {
                    renderOccupiedBooth(container, id, booth);
                    startWebcam(id);
                }
            } else {
                renderEmptyBooth(container, id);
            }
        }

        function renderEmptyBooth(container, id) {
            const number = id.split('-')[1];
            container.innerHTML = `
                <div class="rent-booth">
                    <h4 style="color: #757575; margin: 0 0 10px 0;">Booth #0${number}</h4>
                    <p style="font-size: 14px; color: #888; margin: 0 0 15px 0;">Available for rent.</p>
                    <button class="btn" style="background-color: #e3350d; color: white;" onclick="openRentalForm('${id}')">Rent Here</button>
                </div>
            `;
        }

        function renderOccupiedBooth(container, id, booth) {
            // Check if there's a custom uploaded image, otherwise use a placeholder
            const cardImgHtml = booth.image 
                ? `<img src="${booth.image}" alt="Showcase Items">` 
                : `<p style="color: #999; font-size: 12px; margin: 45px 0 0 0;">No picture uploaded</p>`;

            container.innerHTML = `
                <div class="booth-card">
                    <div>
                        <span class="badge live">🔴 Live Stream</span>
                        <h4>${booth.shopName}</h4>
                        <div class="seller-name">by ${booth.trainerName}</div>
                        
                        <div class="webcam-box">
                            <video id="video-${id}" autoplay playsinline muted></video>
                        </div>

                        <span class="showcase-label">🔥 Card/Pack Featured Showcase:</span>
                        <div class="showcase-box">
                            ${cardImgHtml}
                        </div>

                        <p style="font-size: 14px; margin: 0 0 10px 0;">${booth.description}</p>
                        <div class="specialty">${booth.specialty}</div>
                    </div>
                    <div>
                        <button class="btn">View Shop</button>
                        <button class="btn btn-kick" onclick="kickOut('${id}')">End Stream</button>
                    </div>
                </div>
            `;
        }

        async function startWebcam(id) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const videoElement = document.getElementById(`video-${id}`);
                if (videoElement) {
                    videoElement.srcObject = stream;
                    activeStreams[id] = stream;
                }
            } catch (err) {
                console.error("Camera unavailable", err);
            }
        }

        function openRentalForm(id) {
            targetedBoothId = id;
            document.getElementById('rentalModal').classList.add('active');
        }

        function closeRentalForm() {
            document.getElementById('rentalModal').classList.remove('active');
        }

        function submitRentalForm() {
            const shopName = document.getElementById('shopName').value || "Mystery Shop";
            const trainerName = document.getElementById('trainerName').value || "Trainer_Unknown";
            const description = document.getElementById('description').value || "Welcome to my con booth!";
            const specialty = document.getElementById('specialty').value;
            const fileInput = document.getElementById('boothImage');
            const timestamp = new Date().getTime();

            const processAndSave = (imgBase64 = null) => {
                const boothData = { shopName, trainerName, description, specialty, timestamp, image: imgBase64 };
                localStorage.setItem(targetedBoothId, JSON.stringify(boothData));
                renderBooth(targetedBoothId);
                
                // Clear out values
                document.getElementById('shopName').value = '';
                document.getElementById('trainerName').value = '';
                document.getElementById('description').value = '';
                fileInput.value = '';
                closeRentalForm();
            };

            // Read the image file if it exists, convert it to an format localStorage can hold
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    processAndSave(e.target.result);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                processAndSave();
            }
        }

        function kickOut(id) {
            if (activeStreams[id]) {
                activeStreams[id].getTracks().forEach(track => track.stop());
                delete activeStreams[id];
            }
            localStorage.removeItem(id);
            renderBooth(id);
        }
    </script>
</body>
</html>
