<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéCon Online | Storefront</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gill+Sans+MT:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #222222;
            padding-bottom: 60px;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            background: #2a75d3;
            padding: 8px 16px;
            border-radius: 6px;
        }
        /* Mode Switcher Styling */
        .mode-toggle {
            background: #444;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #ffcb05;
            color: #ffcb05;
            text-transform: uppercase;
        }
        .mode-toggle.renter-on {
            background: #ffcb05;
            color: #222;
        }
        .shop-container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            padding: 40px;
            border-top: 8px solid #ffcb05;
            box-sizing: border-box;
        }
        .shop-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .shop-title h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            margin: 0 0 5px 0;
            color: #2a75d3;
        }
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge.live {
            background-color: #ff0000;
            color: white;
        }
        .badge.offline {
            background-color: #757575;
            color: white;
        }
        .media-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        @media (max-width: 768px) {
            .media-layout { grid-template-columns: 1fr; }
        }
        .video-feed-large {
            background: #000;
            border-radius: 12px;
            height: 300px;
            overflow: hidden;
            display: none;
        }
        .video-feed-large.active-stream {
            display: block;
        }
        .video-feed-large video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-showcase-large {
            background: #e9e9f0;
            border-radius: 12px;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            border: 3px dashed transparent;
            transition: all 0.2s ease;
            position: relative;
        }
        .image-showcase-large:hover {
            border-color: #e3350d;
            background: #e1e1e9;
        }
        .image-showcase-large img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .hover-buy-banner {
            position: absolute;
            bottom: 0;
            background: rgba(227, 53, 13, 0.9);
            color: white;
            width: 100%;
            text-align: center;
            padding: 8px 0;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }
        .specialty-tag {
            background: #f0f4f8;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        /* 📋 ORDERS DASHBOARD (Controlled by the Switch) */
        .dashboard-panel {
            margin-top: 40px;
            background: #fcfcff;
            border: 2px solid #2a75d3;
            border-radius: 12px;
            padding: 25px;
            display: none; /* Hidden by default */
        }
        .dashboard-panel.visible {
            display: block; /* Shown only when Renter Mode is activated */
        }
        .dashboard-panel h3 {
            margin-top: 0;
            color: #2a75d3;
            font-family: 'Montserrat', sans-serif;
            border-bottom: 2px solid #2a75d3;
            padding-bottom: 8px;
        }
        .order-card {
            background: white;
            border: 1px solid #ddd;
            border-left: 5px solid #ffcb05;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .order-card h5 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #e3350d;
        }

        /* Modal Overlays */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 999;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 4px solid #e3350d;
        }
        .modal-content h3 {
            font-family: 'Montserrat', sans-serif;
            margin-top: 0;
            color: #e3350d;
            text-transform: uppercase;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .btn {
            display: inline-block;
            background-color: #ffcb05;
            color: #222;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border-radius: 6px;
            text-transform: uppercase;
            text-align: center;
            border: none;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }
        .btn-blue { background-color: #2a75d3; color: white; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .error-message { text-align: center; padding: 50px 20px; }
    </style>
</head>
<body>

    <header>
        <h1 id="navHeader">🏪 Con Storefront</h1>
        <div class="header-actions">
            <button id="modeToggleBtn" class="mode-toggle" onclick="toggleRenterMode()">Renter View: OFF</button>
            <a href="marketplace.html" class="back-btn">⬅️ Exit Floor</a>
        </div>
    </header>

    <main class="shop-container" id="shopContent">
        </main>

    <div class="modal-overlay" id="checkoutModal">
        <div class="modal-content">
            <h3>🛒 Place Your Order</h3>
            <p style="font-size: 13px; color: #555; margin: -5px 0 15px 0;">Claim your item right from the showcase picture display.</p>
            
            <div class="form-group">
                <label for="itemClaimed">What are you buying?</label>
                <input type="text" id="itemClaimed" placeholder="e.g., 1x Base Set Booster Pack">
            </div>
            <div class="form-group">
                <label for="buyerName">Your Full Name</label>
                <input type="text" id="buyerName" placeholder="Ash Ketchum">
            </div>
            <div class="form-group">
                <label for="shippingAddress">Shipping Address</label>
                <textarea id="shippingAddress" rows="3" placeholder="123 Pallet Town Way, Kanto Region"></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn btn-blue" onclick="closeCheckout()">Cancel</button>
                <button class="btn" style="background-color: #e3350d; color: white;" onclick="submitOrder()">Submit Order</button>
            </div>
        </div>
    </div>

    <script>
        let currentBoothId = '';
        // Use sessionStorage so turning on renter view in one tab doesn't activate it in the other tab!
        let isRenterViewActive = false; 

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            currentBoothId = params.get('id');
            
            // Check if this specific tab was already configured as a renter layout
            if (sessionStorage.getItem(`renter-mode-${currentBoothId}`) === 'true') {
                isRenterViewActive = true;
            }

            loadShopPage();

            window.addEventListener('storage', (e) => {
                if (e.key === currentBoothId || e.key === `${currentBoothId}-orders`) {
                    loadShopPage();
                }
            });
        });

        // Toggle layout style for this specific browser window tab alone
        function toggleRenterMode() {
            isRenterViewActive = !isRenterViewActive;
            sessionStorage.setItem(`renter-mode-${currentBoothId}`, isRenterViewActive);
            loadShopPage();
        }

        function loadShopPage() {
            const shopContent = document.getElementById('shopContent');
            const toggleBtn = document.getElementById('modeToggleBtn');
            
            if (!currentBoothId) {
                showError("No store parameters selected.");
                return;
            }

            const savedData = localStorage.getItem(currentBoothId);
            if (!savedData) {
                showError("This booth workspace is currently vacant or the rental lease expired.");
                return;
            }

            const booth = JSON.parse(savedData);
            
            // Update the Toggle button styles based on local tab settings
            if (isRenterViewActive) {
                toggleBtn.innerText = "Renter View: ON 👑";
                toggleBtn.classList.add('renter-on');
            } else {
                toggleBtn.innerText = "Renter View: OFF 👤";
                toggleBtn.classList.remove('renter-on');
            }

            document.title = `${booth.shopName} | PokéCon Store`;
            document.getElementById('navHeader').innerText = `🏪 ${booth.shopName}`;

            const badgeClass = booth.isLive ? 'badge live' : 'badge offline';
            const badgeText = booth.isLive ? '🔴 Live Right Now' : 'Shop Open';
            const videoClass = booth.isLive ? 'video-feed-large active-stream' : 'video-feed-large';
            
            const imgHtml = booth.image 
                ? `<img src="${booth.image}"><div class="hover-buy-banner">✨ Click Image to Buy Items!</div>` 
                : `<p style="color:#757575; padding: 20px; text-align:center;">No display picture uploaded.</p>`;

            // Pull order history logs
            const orderHistory = JSON.parse(localStorage.getItem(`${currentBoothId}-orders`)) || [];
            let ordersHtml = `<p style="color:#666; font-size:14px;">No incoming orders yet.</p>`;
            
            if (orderHistory.length > 0) {
                ordersHtml = orderHistory.map((ord, index) => `
                    <div class="order-card">
                        <h5>📦 Order #${index + 1}: ${ord.item}</h5>
                        <p style="margin: 4px 0; font-size: 14px;"><strong>Buyer:</strong> ${ord.name}</p>
                        <p style="margin: 4px 0; font-size: 14px;"><strong>Ship To Address:</strong> ${ord.address}</p>
                        <button class="btn" style="padding: 4px 10px; font-size: 11px; width: auto; background: #ccc; margin-top: 5px;" onclick="clearOrder(${index})">Mark as Shipped</button>
                    </div>
                `).join('');
            }

            shopContent.innerHTML = `
                <div class="shop-header-flex">
                    <div class="shop-title">
                        <h2>${booth.shopName}</h2>
                        <div style="color: #666; font-size:16px;">Managed by <strong>${booth.trainerName}</strong></div>
                    </div>
                    <span class="${badgeClass}">${badgeText}</span>
                </div>

                <div class="media-layout">
                    <div class="${videoClass}">
                        <video id="shopVideo" autoplay playsinline muted></video>
                    </div>
                    <div class="image-showcase-large" onclick="openCheckout(${booth.image ? true : false})">
                        ${imgHtml}
                    </div>
                </div>

                <h3>About Our Shop</h3>
                <p style="font-size: 16px; line-height: 1.6; color:#333; margin-bottom: 20px;">${booth.description}</p>
                <div class="specialty-tag">${booth.specialty}</div>

                <div class="dashboard-panel ${isRenterViewActive ? 'visible' : ''}">
                    <h3>👑 Renter Live Dashboard: Incoming Orders</h3>
                    <p style="font-size: 13px; color: #555; margin-top: -5px;">Keep this panel open to check items and shipping tags generated here live.</p>
                    <div id="ordersListContainer">
                        ${ordersHtml}
                    </div>
                </div>
            `;

            if (booth.isLive) {
                startShopStream();
            }
        }

        function openCheckout(hasImage) {
            if (!hasImage) return; 
            document.getElementById('checkoutModal').classList.add('active');
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').classList.remove('active');
        }

        function submitOrder() {
            const item = document.getElementById('itemClaimed').value || "Mystery Pack Lot";
            const name = document.getElementById('buyerName').value || "Anonymous Collector";
            const address = document.getElementById('shippingAddress').value || "No Address Provided";

            const orderHistory = JSON.parse(localStorage.getItem(`${currentBoothId}-orders`)) || [];
            orderHistory.push({ item, name, address });
            localStorage.setItem(`${currentBoothId}-orders`, JSON.stringify(orderHistory));

            alert(`🎉 Order placed successfully!`);
            document.getElementById('itemClaimed').value = '';
            document.getElementById('buyerName').value = '';
            document.getElementById('shippingAddress').value = '';
            
            closeCheckout();
            loadShopPage(); 
        }

        function clearOrder(index) {
            const orderHistory = JSON.parse(localStorage.getItem(`${currentBoothId}-orders`)) || [];
            orderHistory.splice(index, 1);
            localStorage.setItem(`${currentBoothId}-orders`, JSON.stringify(orderHistory));
            loadShopPage();
        }

        async function startShopStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const videoEl = document.getElementById('shopVideo');
                if (videoEl) { videoEl.srcObject = stream; }
            } catch (err) {
                console.error("Camera channel linkage issue", err);
            }
        }

        function showError(msg) {
            document.getElementById('shopContent').innerHTML = `
                <div class="error-message">
                    <h2>⚠️ Space Unavailable</h2>
                    <p>${msg}</p>
                    <a href="marketplace.html" style="color:#2a75d3; font-weight:bold;">Return to Exhibition Floor</a>
                </div>
            `;
        }
    </script>
</body>
</html>
